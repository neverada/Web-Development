<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Poetica</title>
    <link rel="icon" type="image/png" href="images/Screenshot__8_-removebg-preview.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesignin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>
    <div class="container logincontainer">
        <div class="logincard animate__zoomIn animate__animated">
            <a href="index.html" class="back-link"> Back to Home</a>
            <div class="loginheader">
                <h2>Welcome Back</h2>
                <p>Sign In To Your Account</p>
            </div>
            <form action="" id="logignform">
                <div class="formgrp">
                    <div class="form-floating inputwraper">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com"
                            required>
                        <label for="floatingInput">Email address</label>
                    </div>
                </div>
                <div class="formgrp">
                    <div class="form-floating inputwraper">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password"
                            required>
                        <label for="floatingPassword">Password</label>
                        <button class="passwordtoggle" type="button" id="pstoggle">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                </div>
                <div class="formgrp">
                    <div class="form-floating inputwraper">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password"
                            required>
                        <label for="floatingPassword">Confirm Password</label>
                        <button class="passwordtoggle" type="button" id="pstoggle">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                </div>


                <div class="remember-wrapper">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                            Remember me
                        </span>
                    </label>
                </div>
                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Create Account</span>
                </button>
            </form>
            <div class="divider">
                <span>or continue with</span>
            </div>
            <div class="social-login">
                <button type="button" class="social-btn google-btn">
                    <span class="social-icon"><i class="fab fa-google" style="color:#ea4335  ;"></i></span>
                    Google
                </button>
                <button type="button" class="social-btn fb-btn">
                    <span class="social-icon"><i class="fa-brands fa-facebook" style="color: #1877F2;"></i></span>
                    Facebook
                </button>
            </div>
            <div class="signup-text">
                Already have an account? <a href="signin.html">Sign In</a>
            </div>


        </div>
    </div>
    </div>

</body>

</html>
