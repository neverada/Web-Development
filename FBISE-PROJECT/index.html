<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fbise</title>
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- custom style -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">

</head>

<body>
    <!-- Carousel -->
    <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">

            <!-- First Slide: Homepage -->
            <div class="carousel-item active">
                <div class="d-flex flex-column align-items-start justify-content-center text-left slide-container slidec1 px-5">
                    <h1 class="slide-title">Results <span>2024/2025</span></h1>
                    <p class="slide-subtitle">Results of current year including 1st Annual and 2nd Annual examinations are available for all.</p>
                    <a href="#about" class="btn btn-primary mt-3">View Result</a>
                </div>
            </div>

            <!-- Second Slide: Register -->
            <div class="carousel-item">
                <div class="d-flex flex-column align-items-center justify-content-center text-center slide-container">
                    <h1 class="slide-title">Register for Examination</h1>
                    <p class="slide-subtitle">Don’t miss out! Secure your slot today.</p>
                    <a href="#register" class="btn btn-success mt-3">Register Now</a>
                </div>
            </div>

        </div>

        <!-- Carousel Controls -->
        <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
    <script>
        // animate.css v4 uses "animate__animated" as the class that triggers keyframes.
        // Tell WOW to add 'animate__animated' when it shows the element.
        new WOW({
            boxClass: 'wow',                // default: class to mark elements
            animateClass: 'animate__animated', // animate.css v4 uses this prefix
            offset: 100,                    // how many px before element enters viewport
            mobile: true,                   // trigger on mobile?
            live: true                      // act on newly added elements
        }).init();
    </script>
</body>

</html>
