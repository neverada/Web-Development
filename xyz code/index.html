  <style>
    .card {

      height: 250px;

    }

    .card img {
      width: 100px;
      margin-top: 60px;
      /* centers image vertically */
      transition: transform 0.5s ease;
    }

    .text-panel {
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(#ff4d4d, #ff7a7a);
      color: white;
      padding: 20px;
      box-sizing: border-box;
      transition: top 0.5s ease;
    }

    .text-panel h3 {
      margin: 0;
    }

    .card:hover img {
      transform: translateY(40px);
      /* move image down */
    }

    .card:hover .text-panel {
      top: 0;
      /* slide down into place */
    }
  </style>
