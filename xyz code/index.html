<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
    /* General reset */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
}

/* Sidebar base */
.sidebar {
  width: 250px;
  height: 100vh;
  background-color: #111827;
  color: white;
  position: fixed;
  left: 0;
  top: 0;
  transition: 0.3s;
  padding: 20px;
}

/* Sidebar hidden (for small screens) */
.sidebar.hidden {
  left: -260px;
}

/* Main content */
.main-content {
  margin-left: 250px;
  padding: 20px;
  transition: 0.3s;
}

/* When sidebar hidden */
.sidebar.hidden ~ .main-content {
  margin-left: 0;
}

/* Toggle button */
.toggle-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: #2563eb;
  color: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  z-index: 1001;
  border-radius: 8px;
  padding: 8px 12px;
}

/* Responsive behavior */
@media (max-width: 768px) {
  .sidebar {
    left: -260px;
  }
  .sidebar.active {
    left: 0;
  }
  .main-content {
    margin-left: 0;
  }
}

  </style>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3>Fashion</h3>
    <ul>
      <li>Clothes</li>
      <li>Shoes</li>
      <li>Glasses</li>
      <li>Bags</li>
      <li>Makeup</li>
    </ul>
  </div>

  <!-- Toggle Button -->
  <button class="toggle-btn" id="toggleBtn">☰</button>

  <!-- Main Content -->
  <div class="main-content">
    <h1>Welcome to Mantu Clone</h1>
    <p>Your content goes here...</p>
  </div>

<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const sidebar = document.getElementById('sidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('hidden');
    });
  </script>
</body>

</html>
