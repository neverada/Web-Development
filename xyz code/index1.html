<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    button {
      background-color: #169bc7;
      border: none;
      color: white;
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #117ca0;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    .number {
      color: #888;
      font-size: 14px;
    }

    .name {
      font-weight: bold;
      margin: 8px 0;
      font-size: 18px;
    }

    .types {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type {
      padding: 3px 8px;
      border-radius: 4px;
      color: white;
      font-size: 12px;
    }
    .Rock { background: #b8a038; }
    .Water { background: #6890f0; }
    .Grass { background: #78c850; }
    .Poison { background: #a040a0; }
  </style>
</head>
<body>
  <div class="controls">
    <button id="surpriseBtn">🎲 Surprise Me!</button>
    <label for="sort">Sort By:</label>
    <select id="sort">
      <option value="number">Lowest Number (First)</option>
      <option value="name">Name (A-Z)</option>
    </select>
  </div>

  <div class="card-grid" id="pokedex"></div>

  <script>
    const pokemonData = [
      { number: 140, name: "Kabuto", img: "https://img.pokemondb.net/artwork/kabuto.jpg", types: ["Rock", "Water"] },
      { number: 154, name: "Meganium", img: "https://img.pokemondb.net/artwork/meganium.jpg", types: ["Grass"] },
      { number: 693, name: "Clawitzer", img: "https://img.pokemondb.net/artwork/clawitzer.jpg", types: ["Water"] },
      { number: 315, name: "Roselia", img: "https://img.pokemondb.net/artwork/roselia.jpg", types: ["Grass", "Poison"] },
    ];

    const pokedex = document.getElementById("pokedex");

    function renderCards(data) {
      pokedex.innerHTML = "";
      data.forEach(pokemon => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="number">#${String(pokemon.number).padStart(4, '0')}</div>
          <img src="${pokemon.img}" alt="${pokemon.name}">
          <div class="name">${pokemon.name}</div>
          <div class="types">
            ${pokemon.types.map(t => `<span class="type ${t}">${t}</span>`).join("")}
          </div>
        `;
        pokedex.appendChild(card);
      });
    }

    // Default render
    renderCards(pokemonData);

    // Surprise Me
    document.getElementById("surpriseBtn").addEventListener("click", () => {
      const randomPokemon = [pokemonData[Math.floor(Math.random() * pokemonData.length)]];
      renderCards(randomPokemon);
    });

    // Sort
    document.getElementById("sort").addEventListener("change", (e) => {
      let sorted;
      if (e.target.value === "number") {
        sorted = [...pokemonData].sort((a,b) => a.number - b.number);
      } else {
        sorted = [...pokemonData].sort((a,b) => a.name.localeCompare(b.name));
      }
      renderCards(sorted);
    });
  </script>
</body>
</html>
